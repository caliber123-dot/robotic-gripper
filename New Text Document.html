<!DOCTYPE html>
<html>

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: Arial;
    }

    /* Style the tab */
    .tab {
      overflow: hidden;
      border: 3px solid #023075;
      /* background-color: #023075; */
      background-color: #425b81;

    }

    /* Style the buttons inside the tab */
    .tab button {
      background-color: inherit;
      float: left;
      border: none;
      outline: none;
      cursor: pointer;
      padding: 10px 16px;
      transition: 0.3s;
      font-size: 17px;
      color: white;
    }

    /* Change background color of buttons on hover */
    .tab button:hover {
      background-color: #9aabc5;
    }

    /* Create an active/current tablink class */
    .tab button.active {
      background-color: #023075;
    }

    /* Style the tab content */
    .tabcontent {
      display: none;
      padding: 6px 12px;
      border: 3px solid #023075;
      border-top: none;
    }
  </style>
</head>

<body>

  <h2>3 Finger + 1 Thumb Comparison chart</h2>


  <div class="tab">
    <button id="defaultOpen" class="tablinks" onclick="openCity(event, 'Material')">Materials vs Force </button>
    <button class="tablinks" onclick="openCity(event, 'Spring')">Spring Constant vs Force</button>

  </div>

  <div id="Material" class="tabcontent">
    <h3>Materials vs Force</h3>
    <p>Materials is the capital city of England.</p>
  </div>

  <div id="Spring" class="tabcontent">
    <h3>Spring Constant vs Force</h3>
    <p>Spring Constan is the capital of France.</p>
  </div>

  <script>
    function openCity(evt, cityName) {
      var i, tabcontent, tablinks;
      tabcontent = document.getElementsByClassName("tabcontent");
      for (i = 0; i < tabcontent.length; i++) {
        tabcontent[i].style.display = "none";
      }
      tablinks = document.getElementsByClassName("tablinks");
      for (i = 0; i < tablinks.length; i++) {
        tablinks[i].className = tablinks[i].className.replace(" active", "");
      }
      document.getElementById(cityName).style.display = "block";
      evt.currentTarget.className += " active";
    }
    document.getElementById("defaultOpen").click();
  </script>

</body>

</html>
